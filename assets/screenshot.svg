  <g>
    <rect x="560" y="180" width="396" height="58" rx="9" fill="#11160f" stroke="#243024"/><rect x="560" y="180" width="3" height="58" fill="#2bdc7f"/><text x="575" y="202" fill="#e8f0e6" font-size="12" font-weight="600">$KEYCAT · signal 78</text><text x="575" y="220" fill="#86977f" font-size="11">fresh, buy pressure · send to chat ▶</text>
    <rect x="560" y="246" width="396" height="58" rx="9" fill="#11160f" stroke="#243024"/><rect x="560" y="246" width="3" height="58" fill="#ffcf4a"/><text x="575" y="268" fill="#e8f0e6" font-size="12" font-weight="600">Base gas is cheap (0.003 gwei)</text><text x="575" y="286" fill="#86977f" font-size="11">good window to rebalance</text>
